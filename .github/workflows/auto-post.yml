name: 楽天ROOM 自動投稿

on:
  schedule:
    # JST 07:00 → UTC 22:00 (前日)
    - cron: "0 22 * * *"
    # JST 12:00 → UTC 03:00
    - cron: "0 3 * * *"
    # JST 17:00 → UTC 08:00
    - cron: "0 8 * * *"
    # JST 21:00 → UTC 12:00
    - cron: "0 12 * * *"
    # JST 23:00 → UTC 14:00
    - cron: "0 14 * * *"
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      target_genre:
        description: "ターゲットジャンル (general/furusato/electronics/1000yen)"
        required: false
        default: "general"
      post_count:
        description: "投稿数"
        required: false
        default: "1"
      trend_mode:
        description: "トレンドモード (true=Yahooトレンド+Gemini / false=ランキング+Groq)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係をインストール
        run: npm ci

      - name: Playwright Chromium をインストール
        run: npx playwright install chromium --with-deps

      - name: 自動投稿を実行
        env:
          CI: "true"
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROOM_COOKIE: ${{ secrets.ROOM_COOKIE }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_USERNAME: ${{ secrets.X_USERNAME || vars.X_USERNAME || '' }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ROOM_PROFILE_URL: ${{ secrets.ROOM_PROFILE_URL || vars.ROOM_PROFILE_URL || '' }}
          TARGET_GENRE: ${{ github.event.inputs.target_genre || vars.TARGET_GENRE || 'general' }}
          POST_COUNT: ${{ github.event.inputs.post_count || vars.POST_COUNT || '1' }}
          TREND_MODE: ${{ github.event.inputs.trend_mode || vars.TREND_MODE || 'false' }}
          MAX_PRICE: ${{ vars.MAX_PRICE || '5000' }}
          MIN_PRICE: ${{ vars.MIN_PRICE || '1000' }}
          GENRE_ID_FURUSATO: ${{ vars.GENRE_ID_FURUSATO || '553066' }}
          GENRE_ID_ELECTRONICS: ${{ vars.GENRE_ID_ELECTRONICS || '215783' }}
        run: npx tsx src/main.ts

      - name: 投稿済みリストをコミット
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_items.json
          git diff --staged --quiet || git commit -m "chore: 投稿済み商品リストを更新 [skip ci]"
          git push

      - name: エラースクリーンショットをアップロード（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot-${{ github.run_id }}
          path: error.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 実行ログをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 3
          if-no-files-found: ignore
